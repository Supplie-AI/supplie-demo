name: Dev CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: ${{ secrets.EKS_CLUSTER_DEV }}
  K8S_NAMESPACE: supplie-dev

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          DEMO_PASSWORD: test_password
          OPENAI_API_KEY: test-openai-key
          ANTHROPIC_API_KEY: test-anthropic-key

  deploy-eks-dev:
    name: Deploy to EKS Dev
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "supplie_image=${ECR_REGISTRY}/supplie-demo:dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.supplie_image }}
            ${{ env.ECR_REGISTRY }}/supplie-demo:dev-latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/supplie-demo:dev-latest
          cache-to: type=inline

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${AWS_REGION}" \
            --name "${EKS_CLUSTER}"

      - name: Apply namespace
        run: |
          sed "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            k8s/namespace.yaml | kubectl apply -f -

      - name: Apply secrets
        run: |
          kubectl create secret generic supplie-secrets \
            --namespace="${K8S_NAMESPACE}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=DEMO_PASSWORD="${{ secrets.DEMO_PASSWORD_DEV }}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy app
        run: |
          sed \
            -e "s|SUPPLIE_IMAGE|${{ steps.tags.outputs.supplie_image }}|g" \
            -e "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            k8s/supplie-deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/supplie-demo -n "${K8S_NAMESPACE}" --timeout=180s

      - name: Expose public service
        run: |
          sed "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            k8s/supplie-dev-public-service.yaml | kubectl apply -f -

      - name: Wait for load balancer
        id: lb
        run: |
          for i in $(seq 1 30); do
            HOST=$(kubectl get service supplie-demo-public -n "${K8S_NAMESPACE}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOST" ]; then
              echo "hostname=$HOST" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for load balancer hostname" >&2
          exit 1

      - name: Summary
        run: |
          echo "## Dev Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.tags.outputs.supplie_image }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Namespace: \`${K8S_NAMESPACE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Load balancer: \`${{ steps.lb.outputs.hostname }}\`" >> "$GITHUB_STEP_SUMMARY"
