name: Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: supplie-demo
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  K8S_NAMESPACE: supplie
  PROD_HOST: demo.supplie.ai

jobs:
  build-and-deploy:
    name: Build → ECR → Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "supplie_image=$ECR_REGISTRY/supplie-demo:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build & push supplie-demo image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.supplie_image }}
            ${{ env.ECR_REGISTRY }}/supplie-demo:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/supplie-demo:latest
          cache-to: type=inline

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Cluster snapshot
        run: |
          kubectl config current-context
          kubectl get nodes -o wide
          kubectl get namespace "${K8S_NAMESPACE}" -o wide

      - name: Apply namespace & secrets
        run: |
          sed "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            k8s/namespace.yaml | kubectl apply -f -

          kubectl create secret generic supplie-secrets \
            --namespace="${K8S_NAMESPACE}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=DEMO_PASSWORD="${{ secrets.DEMO_PASSWORD }}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy supplie-demo
        run: |
          sed \
            -e "s|SUPPLIE_IMAGE|${{ steps.tags.outputs.supplie_image }}|g" \
            -e "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            k8s/supplie-deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/supplie-demo -n "${K8S_NAMESPACE}" --timeout=180s

      - name: Apply ingress
        run: |
          sed \
            -e "s|SUPPLIE_NAMESPACE|${K8S_NAMESPACE}|g" \
            -e "s|SUPPLIE_HOST|${PROD_HOST}|g" \
            -e "s|ACM_CERT_ARN|${{ secrets.ACM_CERT_ARN }}|g" \
            k8s/ingress.yaml | kubectl apply -f -

      - name: Get ALB hostname
        run: |
          echo "Waiting for ALB address..."
          for i in $(seq 1 12); do
            HOST=$(kubectl get ingress supplie-demo -n "${K8S_NAMESPACE}" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOST" ]; then
              echo "✅ ALB: https://$HOST"
              break
            fi
            sleep 10
          done

      - name: Show recent app logs
        if: success()
        run: |
          kubectl logs deployment/supplie-demo -n "${K8S_NAMESPACE}" --tail=80 || true

      - name: Collect Kubernetes diagnostics on failure
        if: failure()
        run: |
          bash scripts/collect-k8s-diagnostics.sh "${K8S_NAMESPACE}" "supplie-demo"

      - name: Summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **supplie-demo image:** \`${{ steps.tags.outputs.supplie_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** \`${K8S_NAMESPACE}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${PROD_HOST}" >> $GITHUB_STEP_SUMMARY
          echo "- **Recent logs:** \`kubectl logs deployment/supplie-demo -n ${K8S_NAMESPACE} --tail=80\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Failure diagnostics:** \`bash scripts/collect-k8s-diagnostics.sh ${K8S_NAMESPACE} supplie-demo\`" >> $GITHUB_STEP_SUMMARY
